<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
	<meta name="_csrf" th:content="${_csrf.token}"/>
	<meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Home</title>
    <link rel="stylesheet" href="/css/general.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">
	<div th:replace="header :: mainHeader"></div>

    <!-- Button zum Öffnen des Modals -->
    <button class="btn btn-primary" id="openGroupModal">Neue Gruppe anlegen</button>

    <!-- Modal -->
    <div class="modal fade" id="groupModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Neue Gruppe erstellen</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
                </div>

                <div class="modal-body">
                    <form id="groupForm" method="post" action="/groupmain/new">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label for="groupName" class="form-label">Gruppenname</label>
                            <input type="text" 
                                   class="form-control" 
                                   id="groupName" 
                                   name="groupName"
                                   placeholder="Name der Gruppe" 
                                   required>
                        </div>
                    </form>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
                    <button type="button" class="btn btn-success" id="saveGroupBtn">Speichern</button>
                </div>
            </div>
        </div>
    </div>
	<h2>Meine Gruppen</h2>
	<table class="table table-bordered">
	    <thead>
	        <tr>
	            <th>Gruppenname</th>
	            <th>Anzahl Mitglieder</th>
	        </tr>
	    </thead>
	    <tbody>
	        <tr th:each="group : ${groups}">
	            <td>
					<a th:href="@{/groups/{id}(id=${group.id})}"
					   th:text="${group.name}"></a>
				</td>
	            <td th:text="${#lists.size(group.members)}"></td>
	        </tr>
	    </tbody>
	</table>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Modal-Instanz
        const groupModal = new bootstrap.Modal(document.getElementById('groupModal'));

        // Öffnen des Modals
        document.getElementById('openGroupModal').addEventListener('click', () => {
            groupModal.show();
        });

        // Speichern-Button
        document.getElementById('saveGroupBtn').addEventListener('click', () => {
            const groupName = document.getElementById('groupName').value.trim();

            if (groupName === "") {
                alert("Bitte einen Gruppennamen eingeben!");
                return;
            }

            // Formular absenden
            document.getElementById('groupForm').submit();
        });
    </script>


	<!-- Bootstrap JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

	
</body>
</html>
