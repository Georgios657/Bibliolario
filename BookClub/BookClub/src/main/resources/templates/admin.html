<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Bereich</title>
	<link rel="stylesheet" href="/css/general.css">
	
	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">



</head>
<body>
	<div th:replace="header :: mainHeader"></div>

<h1>Adminbereich – Benutzerübersicht</h1>

<table border="1" cellpadding="8">
    <thead>
        <tr>
            <th>ID</th>
            <th>Benutzername</th>
            <th>Email</th>
            <th>Rolle</th>
			<th>Aktion</th>
			<th>Löschen</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.username}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.role}"></td>
			

			<td>
			    <!-- BEFÖRDERN: nur für USER -->
			    <form th:if="${user.role == 'USER'}"
			          th:action="@{'/admin/promote/' + ${user.id}}"
			          method="post"
			          style="display:inline;"
					 >
			        <button type="submit">Befördern</button>
			    </form>

			    <!-- DEGRADIEREN: nur für ADMIN, nicht SUPERADMIN -->
			    <form th:if="${user.role == 'ADMIN'}"
			          th:unless="${user.role == 'SUPERADMIN'}"
			          th:action="@{'/admin/demote/' + ${user.id}}"
			          method="post"
			          style="display:inline;">
			        <button type="submit">Degradieren</button>
			    </form>
			</td>
			<td>
			    <!-- Benutzer Löschen -->
			    <form
					sec:authorize="hasRole('SUPERADMIN')"
					th:unless="${user.role == 'SUPERADMIN'}"
			          th:action="@{'/admin/delete/' + ${user.id}}"
			          method="post"
			          style="display:inline;"
					   onsubmit="return confirm('Soll dieser Benutzer wirklich gelöscht werden?');">
			        <button type="submit">Benutzer löschen</button>
			    </form>
			</td>
        </tr>
    </tbody>
	
</table>

<a class="btn" th:href="@{/mainpage}">Zurück zur Hauptseite</a>	
<a class="btn" th:href="@{/admin/AdminBook}">Buch-Verwaltung</a>	


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
