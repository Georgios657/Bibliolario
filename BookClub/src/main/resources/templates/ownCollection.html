<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
	<meta name="_csrf" th:content="${_csrf.token}"/>
	<meta name="_csrf_header" th:content="${_csrf.headerName}"/>
	
	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	
    <title>Buchsuche</title>
	<link rel="stylesheet" href="/css/general.css">
</head>
<body>
	<header th:replace="header :: mainHeader"></header>

<h1>Buch hinzufügen</h1>

<!-- Suchformular -->
<form th:action="@{/collectionSearch}" method="post">
	<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <label for="search">Titel oder ISBN:</label>
    <input type="text" id="search" name="search" required>
    <button type="submit">Suchen</button>
	<div th:if="${errorMessage}" style="color:red;">
	    <p th:text="${errorMessage}"></p>
	</div>
</form>

<!-- Tabelle -->
<table border="1" cellpadding="8">
    <thead>
    <tr>
        <th>Buchname</th>
        <th>Sterne</th>
        <th>Story</th>
        <th>Cover</th>
        <th>Fetisch-Factor</th>
		<th>Kommentar</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="rating : ${myCollection}">
        <td th:text="${rating.book.bookName}"></td>
        <td th:text="${rating.stars}"></td>
        <td th:text="${rating.storyQuality}"></td>
        <td th:text="${rating.coverArt}"></td>
        <td th:text="${rating.fetish}"></td>
		<td th:text="${rating.comment}"></td>
        <td>
            <!-- Button öffnet Modal -->
            <button type="button" class="openModalBtn"
                    th:attr="data-id=${rating.id},
                             data-stars=${rating.stars},
                             data-story=${rating.storyQuality},
                             data-cover-art=${rating.coverArt},
                             data-fetish=${rating.fetish},
							 data-comment=${rating.comment ?: ''}">
                Bewerten
            </button>
        </td>
    </tr>
    </tbody>
</table>
<a class="btn" th:href="@{/mainpage}">Zurück zur Hauptseite</a>	

<!-- Modal -->
<div id="myModal" class="custommodal">
    <div class="custommodal-content">
        <span class="close">&times;</span>
        <h2>Bewertung abgeben</h2>
        <form id="ratingForm" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <label>Sterne:</label>
            <input type="number" name="stars" min="1" max="5" required><br>
            <label>Story:</label>
            <input type="number" name="storyQuality" min="1" max="5" required><br>
            <label>Cover:</label>
            <input type="number" name="coverArt" min="1" max="5" required><br>
            <label>Fetisch-Faktor:</label>
            <input type="number" name="fetish" min="1" max="5" required><br>
			<label>Kommentar:</label>
			<input type="text" name="comment"><br>
            <button type="submit">Speichern</button>
        </form>
    </div>
</div>

<!-- JavaScript -->
<script>
    const modal = document.getElementById("myModal");
    const closeBtn = document.querySelector(".close");
    const ratingForm = document.getElementById("ratingForm");

    document.querySelectorAll(".openModalBtn").forEach(button => {
        button.addEventListener("click", () => {
            // Setze Action-URL
                ratingForm.action = "/ownCollection/rate/" + button.dataset.id;

            // Vorbefüllen der Felder
            document.querySelector("input[name='stars']").value = button.dataset.stars;
            document.querySelector("input[name='storyQuality']").value = button.dataset.story;
            document.querySelector("input[name='coverArt']").value = button.dataset.coverArt;
            document.querySelector("input[name='fetish']").value = button.dataset.fetish;
			document.querySelector("input[name='comment']").value = button.dataset.comment;

            modal.style.display = "block";
        });
    });

    // Schließen des Modals
    closeBtn.onclick = () => modal.style.display = "none";
    window.onclick = (event) => {
        if (event.target === modal) modal.style.display = "none";
    };
</script>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
