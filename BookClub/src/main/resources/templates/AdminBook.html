
<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Buch hinzufügen</title>
	<link rel="stylesheet" href="/css/general.css">
	
	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


</head>
<body>
	<div th:replace="header :: mainHeader"></div>

	<h1>Buch hinzufügen</h1>
	<form th:action="@{/admin/AdminBook}" method="post">
	    <label for="isbn">ISBN:</label>
	    <input 
		type="text" 
		id="isbn" 
		name="isbn" 
		required
		inputmode="numeric"
		autocomplete="off"
		pattern="^(\d{9}[\dXx]|\d{13}|(?:\d[\-\s]?){9}[\dXx]|(?:\d[\-\s]?){13})$"
		title="Gib eine gültige ISBN-10 (10 Zeichen, ggf. X) oder ISBN-13 (13 Ziffern) ein. Bindestriche/Leerzeichen sind erlaubt."
		>
	    <button type="submit">Hinzufügen</button>

		<div th:if="${errorMessage}" style="color:red;">
		    <p th:text="${errorMessage}"></p>
		</div>

	</form>


	<table border="1" cellpadding="8">
	    <thead>
	        <tr>
	            <th>Buch</th>
	            <th>Autoren</th>
	            <th>Veröffentkeitsdatum</th>
				<th>Sprache</th>
	            <th>Cover</th>
	        </tr>
	    </thead>
	
	<tbody>
	    <tr th:each="book : ${books}">
	        <td th:text="${book.bookName}"></td>
	        <td>
			<span th:each="author, iterStat : ${book.authors}">
			        <span th:text="${author}"></span>
			        <span th:if="${!iterStat.last}">, </span>
			    </span>
</td>
	        <td th:text="${book.publishDate}"></td>
			<td th:text="${book.language}"></td>
			<td>
			    <img th:src="${book.bookPicURL}" class="book-cover" alt="Buchcover" />
			</td>
			<td>
			    <!-- Löschen -->
			    <form 
			          th:action="@{'/admin/AdminBook/delete/' + ${book.ISBN}}"
			          method="post"
			          style="display:inline;">
			        <button type="submit">Löschen</button>
			    </form>
				</td>
	    </tr>
	</tbody>
	</table>
	
	<a class="btn" th:href="@{/mainpage}">Zurück zur Hauptseite</a>	
	<a class="btn" th:href="@{/admin/AdminBook}">Buch-Verwaltung</a>	

	<!-- Bootstrap JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	
</body>
</html>
